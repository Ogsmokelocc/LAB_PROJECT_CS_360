    .form-container {
        font-weight: bolder;
        margin: 0.6rem;
        background-color: rgb(255, 253, 254);
        animation-name: myAnimation;
        animation-duration: 1s;
        animation-iteration-count: infinite;
    }

    .btn-primary{
        background-color: blue;
        border-color: rgb(156, 42, 156);

<body>
    
    <div class="form-container">
        <table>
        <h1>Employee register Form</h1>
        <form id="registerForm">
            <div class ="mb-3">
                <label for="FirstName" class="form-label">First Name</label>
                <input type="text" class="form-control" name="FirstName" placeholder="ENTER" required/>
            </div>

            <div class ="mb-3">
                <label for="LastName" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="LastName" name="LastName" placeholder="Enter Last Name" required/>
            </div>

            <div class="mb-3">
                <label for="MailAddress_1" class="form-label">Email Address 1</label>
                <input type="text" class="form-control" id="MailAddress_1" name="MailAddress_1" placeholder="Email@email.com" required/>
            </div>

            <div class="mb-3">
                <label for="MailAddress_2" class="form-label">Email Address 2</label>
                <input type="text" class="form-control" id="MailAddress_2" name="MailAddress_2" placeholder="Email@email.com" required/>
            </div>

            <div class ="mb-3">
                <label for="City" class="label-form"><span>City</span></label>
                <input type="text" class="form-control" id="City" name="City" placeholder="Enter City" required/>
            </div>

            <div class="mb-3">
                <label for="State" class="label-form">State</label>
                <input for="text" class="form-control" id="State" name="State" placeholder="Enter State" required/>
            </div>

            <div class="mb-3">
                <label for="zipCode" class="label-form">Zip Code</label>
                <input for="text" class="form-control" id="zipCode" name="zipCode" placeholder="Enter Zip Code" required/>
            </div>

            <div class="mb-3">
                <label for="UploadPhoto" class="label-form"</label>
                <button type="Upload" class="btn btn-primary w-100">Submit</button>
            </div>

        </form>
         </table>
    </div>
</body>
