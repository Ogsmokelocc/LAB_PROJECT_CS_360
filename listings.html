<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Rentals</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

        :root {
            --primary: #C17857;
            --secondary: #3D7D8A;
            --accent: #F5DEB3;
            --dark: #2D3436;
            --light: #F8F6F1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            overflow-x: hidden;
            background: #E8DCC8;
            min-height: 100vh;
            background-image: url(./MoscowPictures/IMG_4689.JPG);
            background-repeat: no-repeat;
            background-attachment: scroll;
            background-size: cover;
            background-position: center;
            background-blend-mode: multiply;
            background-color: rgba(224, 179, 136, 0.4);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }


        #header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 100px;
            /* need to add this styling to all pages*/
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(180deg, rgba(248, 246, 241, 0.95) 0%, rgba(248, 246, 241, 0.8) 100%);
            box-shadow: 0 4px 20px rgba(45, 52, 54, 0.1);
        }

        #header .logo {
            font-weight: 700;
            font-size: 2rem;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        #header .logo img {
            height: 70px;
            width: auto;
            filter: drop-shadow(0 2px 4px rgba(45, 52, 54, 0.15));
        }

        #header ul {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        #header ul li {
            list-style: none;
        }

        #header ul li a {
            text-decoration: none;
            padding: 8px 14px;
            color: var(--dark);
            background: transparent;
            border: 1px solid rgba(45, 34, 30, 0.08);
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.6px;
            transition: color 220ms ease, background 220ms ease, transform 180ms ease;
            position: relative;
            white-space: nowrap;
            padding-inline: 14px 14px;
        }

        #header ul li a:hover,
        #header ul li a.active {
            color: var(--dark);
            background: rgba(193, 120, 87, 0.06);
            transform: translateY(-2px);
        }

        /* for the body of the wbepage*/
        .page-content {
            padding-top: 120px;
            padding-bottom: 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem;
            color: var(--light);
            text-shadow: 0 2px 12px rgba(45, 52, 54, 0.45);
            letter-spacing: 1px;
            text-align: center;
        }

        .search-card {
            background: rgba(248, 246, 241, 0.93);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(45, 52, 54, 0.15);
            padding: 28px 36px;
            width: 90%;
            max-width: 860px;
        }


        .search-card h2 {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr auto;
            gap: 14px;
            align-items: end;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group label {
            font-size: 0.70rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #6b6560;
        }

        .field-group input,
        .field-group select {
            padding: 10px 14px;
            border: 1.5px solid rgba(45, 34, 30, 0.14);
            border-radius: 8px;
            font-size: 0.88rem;
            color: var(--dark);
            background: #fff;
            outline: none;
            transition: border-color 200ms ease, box-shadow 200ms ease;
            font-family: 'Montserrat', sans-serif;
        }

        .field-group input:focus,
        .field-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(193, 120, 87, 0.12);
        }

        .btn-search {
            padding: 11px 28px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.6px;
            cursor: pointer;
            transition: background 200ms ease, transform 180ms ease, box-shadow 200ms ease;
            white-space: nowrap;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-search:hover {
            background: #a8623e;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(193, 120, 87, 0.35);
        }

        /* ── RESULTS META ── */
        .results-meta {
            width: 90%;
            max-width: 860px;
            font-size: 0.82rem;
            font-weight: 600;
            color: rgba(248, 246, 241, 0.9);
            letter-spacing: 0.5px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        .listings-card {
            background: rgba(248, 246, 241, 0.93);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(45, 52, 54, 0.15);
            width: 90%;
            max-width: 860px;
            overflow: hidden;
        }

        .listings-header {
            padding: 16px 24px;
            border-bottom: 1.5px solid rgba(45, 34, 30, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .listings-header span {
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--primary);
        }

        .sort-select {
            padding: 6px 12px;
            border: 1.5px solid rgba(45, 34, 30, 0.12);
            border-radius: 6px;
            font-size: 0.76rem;
            font-weight: 600;
            color: var(--dark);
            background: #fff;
            outline: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }

        .listings-scroll {
            max-height: 520px;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 18px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) rgba(45, 34, 30, 0.08);
        }


        .listings-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .listings-scroll::-webkit-scrollbar-track {
            background: rgba(45, 34, 30, 0.06);
            border-radius: 3px;
        }

        .listings-scroll::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }
