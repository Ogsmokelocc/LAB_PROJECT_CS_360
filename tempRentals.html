

<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Rentals – Palouse Properties</title>
 
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
 
        :root {
            --primary: #C17857;
            --secondary: #3D7D8A;
            --accent: #F5DEB3;
            --dark: #2D3436;
            --light: #F8F6F1;
        }
 
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
 
        body {
            overflow-x: hidden;
            background: #E8DCC8;
            min-height: 100vh;
            background-image: url(./MoscowPictures/IMG_4689.JPG);
            background-repeat: no-repeat;
            background-attachment: scroll;
            background-size: cover;
            background-position: center;
            background-blend-mode: multiply;
            background-color: rgba(224, 179, 136, 0.4);

        }
 
        /* ── HEADER ── */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(180deg, rgba(248, 246, 241, 0.95) 0%, rgba(248, 246, 241, 0.88) 100%);
            box-shadow: 0 4px 20px rgba(45, 52, 54, 0.1);
        }
 
        #header .logo { font-weight: 700; font-size: 2rem; text-decoration: none; display: flex; align-items: center; }
        #header .logo img { height: 60px; width: auto; filter: drop-shadow(0 2px 4px rgba(45, 52, 54, 0.15)); }
        #header ul { display: flex; justify-content: center; align-items: center; gap: 10px; }
        #header ul li { list-style: none; }
        #header ul li a {
            text-decoration: none; padding: 8px 14px; color: var(--dark); background: transparent;
            border: 1px solid rgba(45, 34, 30, 0.08); border-radius: 6px; font-weight: 600;
            font-size: 0.85rem; letter-spacing: 0.6px;
            transition: color 220ms ease, background 220ms ease, transform 180ms ease; white-space: nowrap;
        }
        #header ul li a:hover, #header ul li a.active {
            color: var(--dark); background: rgba(193, 120, 87, 0.10); transform: translateY(-2px);
        }
 
        /* ── PAGE BODY ── */
        .page-content {
            padding-top: 120px;
            padding-bottom: 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }
 
        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem;
            color: var(--light);
            text-shadow: 0 2px 12px rgba(45,52,54,0.45);
            letter-spacing: 1px;
            text-align: center;
        }
 
        /* ── SEARCH FORM ── */
        .search-card {
            background: rgba(248, 246, 241, 0.93);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(45, 52, 54, 0.15);
            padding: 28px 36px;
            width: 90%;
            max-width: 860px;
        }
 
        .search-card h2 {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 20px;
        }
 
        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr auto;
            gap: 14px;
            align-items: end;
        }
 
        .field-group { display: flex; flex-direction: column; gap: 6px; }
 
        .field-group label {
            font-size: 0.70rem; font-weight: 700; letter-spacing: 0.8px;
            text-transform: uppercase; color: #6b6560;
        }
 
        .field-group input, .field-group select {
            padding: 10px 14px;
            border: 1.5px solid rgba(45, 34, 30, 0.14);
            border-radius: 8px;
            font-size: 0.88rem;
            color: var(--dark);
            background: #fff;
            outline: none;
            transition: border-color 200ms ease, box-shadow 200ms ease;
            font-family: 'Montserrat', sans-serif;
        }
 
        .field-group input:focus, .field-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(193, 120, 87, 0.12);
        }
 
        .btn-search {
            padding: 11px 28px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.6px;
            cursor: pointer;
            transition: background 200ms ease, transform 180ms ease, box-shadow 200ms ease;
            white-space: nowrap;
            font-family: 'Montserrat', sans-serif;
        }
 
        .btn-search:hover {
            background: #a8623e;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(193, 120, 87, 0.35);
        }
 
        /* ── RESULTS META ── */
        .results-meta {
            width: 90%;
            max-width: 860px;
            font-size: 0.82rem;
            font-weight: 600;
            color: rgba(248,246,241,0.9);
            letter-spacing: 0.5px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
 
        /* ── SCROLLABLE LISTINGS BOX ── */
        .listings-card {
            background: rgba(248, 246, 241, 0.93);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(45, 52, 54, 0.15);
            width: 90%;
            max-width: 860px;
            overflow: hidden;
        }
 
        .listings-header {
            padding: 16px 24px;
            border-bottom: 1.5px solid rgba(45,34,30,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
 
        .listings-header span {
            font-size: 0.76rem; font-weight: 700;
            letter-spacing: 1.2px; text-transform: uppercase; color: var(--primary);
        }
 
        .sort-select {
            padding: 6px 12px;
            border: 1.5px solid rgba(45,34,30,0.12);
            border-radius: 6px;
            font-size: 0.76rem;
            font-weight: 600;
            color: var(--dark);
            background: #fff;
            outline: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }
 
        .listings-scroll {
            max-height: 520px;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 18px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) rgba(45,34,30,0.08);
        }
 
        .listings-scroll::-webkit-scrollbar { width: 6px; }
        .listings-scroll::-webkit-scrollbar-track { background: rgba(45,34,30,0.06); border-radius: 3px; }
        .listings-scroll::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
 
        /* ── PROPERTY CARD ── */
        .property-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(45, 52, 54, 0.08);
            transition: transform 220ms ease, box-shadow 220ms ease;
            cursor: pointer;
            border: 1.5px solid rgba(45,34,30,0.06);
            position: relative;
        }
 
        .property-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(45, 52, 54, 0.15);
        }
 
        .property-img-wrap {
            width: 100%;
            aspect-ratio: 4/3;
            overflow: hidden;
            position: relative;
        }
 
        .property-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 400ms ease;
        }
 
        .property-card:hover .property-img-wrap img {
            transform: scale(1.04);
        }
 
        .property-img-placeholder {
            width: 100%;
            aspect-ratio: 4/3;
            background: linear-gradient(135deg, #ede3d4 0%, #d4c4a8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            opacity: 0.5;
        }
 
        .img-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 0.66rem;
            font-weight: 700;
            letter-spacing: 0.6px;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            z-index: 2;
        }
 
        .badge-available { background: var(--primary); }
        .badge-leased    { background: #888; }
 
        .property-info { padding: 14px 16px; }
 
        .property-price {
            font-size: 1.12rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 4px;
        }
 
        .property-price span { font-size: 0.72rem; font-weight: 500; color: #8a8278; }
 
        .property-address {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 10px;
            line-height: 1.3;
        }
 
        .property-details { display: flex; gap: 12px; flex-wrap: wrap; }
 
        .detail-chip {
            font-size: 0.72rem;
            font-weight: 600;
            color: #7a726a;
            display: flex;
            align-items: center;
            gap: 4px;
        }
 
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 20px;
            color: #8a8278;
            font-size: 0.88rem;
            font-weight: 500;
        }
 
        @media (max-width: 820px) {
            #header { padding: 16px 24px; }
            #header ul { display: none; }
            .search-grid { grid-template-columns: 1fr 1fr; }
            .search-grid .btn-search { grid-column: 1 / -1; }
            .listings-scroll { grid-template-columns: 1fr; }
        }
    </style>
</head>
 
<body>
    <header id="header">
        <a href="#" class="logo"><img src="./MoscowPictures/pplogo.png" alt="Palouse Properties"></a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="rentals.html" class="active">Rentals</a></li>
            <li><a href="https://www.paylease.com/registration/pay_portal/6623/STD/?crd=1&vpw=1680">Pay Online</a></li>
            <li><a href="maintenance.html">Maintenance</a></li>
            <li><a href="applications_Forms.html">Applications And Forms</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </header>
 
    <div class="page-content">
        <h1 class="page-title">Available Rentals</h1>
 
        <!-- Search Form -->
        <div class="search-card">
            <h2>Find Your Home</h2>
            <div class="search-grid">
                <div class="field-group">
                    <label for="search-location">Location / Address</label>
                    <input type="text" id="search-location" placeholder="Moscow, ID…" onkeydown="if(event.key==='Enter') searchProperties()">
                </div>
                <div class="field-group">
                    <label for="search-type">Property Type</label>
                    <select id="search-type">
                        <option value="">All Types</option>
                        <option value="apartment">Apartment</option>
                        <option value="house">House</option>
                        <option value="studio">Studio</option>
                        <option value="townhouse">Townhouse</option>
                    </select>
                </div>
                <div class="field-group">
                    <label for="search-beds">Bedrooms</label>
                    <select id="search-beds">
                        <option value="">Any</option>
                        <option value="0">Studio</option>
                        <option value="1">1 Bed</option>
                        <option value="2">2 Beds</option>
                        <option value="3">3 Beds</option>
                        <option value="4">4+ Beds</option>
                    </select>
                </div>
                <div class="field-group">
                    <label for="search-price">Max Rent / mo ($)</label>
                    <input type="number" id="search-price" placeholder="e.g. 1500" min="0">
                </div>
                <button class="btn-search" onclick="searchProperties()">Search</button>
            </div>
        </div>
 
        <!-- Results meta -->
        <div class="results-meta" id="results-meta">Loading properties…</div>
 
        <!-- Listings Box -->
        <div class="listings-card">
            <div class="listings-header">
                <span>Properties</span>
                <select class="sort-select" id="sort-select" onchange="sortListings(this.value)">
                    <option value="price-asc">Price: Low → High</option>
                    <option value="price-desc">Price: High → Low</option>
                    <option value="beds-desc">Beds: Most First</option>
                    <option value="beds-asc">Beds: Fewest First</option>
                </select>
            </div>
            <div class="listings-scroll" id="listings-grid"></div>
        </div>
    </div>
 
    <script>
        // ─────────────────────────────────────────────────────
        // PLACEHOLDER DATA — Replace with your Node.js API call
        //
        // Example Node.js / Express endpoint:
        //   app.get('/api/properties', async (req, res) => {
        //     const [rows] = await db.query('SELECT * FROM properties WHERE available = 1');
        //     res.json(rows);
        //   });
        //
        // Then replace the static array below with:
        //   const res = await fetch('/api/properties');
        //   allProperties = await res.json();
        // ─────────────────────────────────────────────────────
        let allProperties = [
            { id: 1, address: "123 Palouse St, Moscow, ID", type: "Apartment", beds: 2, baths: 1, sqft: 850,  price: 1100, available: true,  image: null },
            { id: 2, address: "456 Elm Ave, Moscow, ID",    type: "House",     beds: 3, baths: 2, sqft: 1400, price: 1650, available: true,  image: null },
            { id: 3, address: "789 Grimes Way, Moscow, ID", type: "Studio",    beds: 0, baths: 1, sqft: 460,  price: 750,  available: true,  image: null },
            { id: 4, address: "22 University Dr, Moscow, ID",type:"Apartment", beds: 1, baths: 1, sqft: 620,  price: 900,  available: false, image: null },
            { id: 5, address: "310 Baker St, Moscow, ID",   type: "Townhouse", beds: 3, baths: 2, sqft: 1600, price: 1850, available: true,  image: null },
            { id: 6, address: "88 Hillcrest Blvd, Moscow, ID",type:"House",   beds: 4, baths: 2, sqft: 1800, price: 2100, available: true,  image: null },
        ];
 
        let filtered = [...allProperties];
 
        function searchProperties() {
            const location = document.getElementById('search-location').value.toLowerCase().trim();
            const type     = document.getElementById('search-type').value.toLowerCase();
            const beds     = document.getElementById('search-beds').value;
            const maxPrice = parseFloat(document.getElementById('search-price').value) || Infinity;
 
            filtered = allProperties.filter(p => {
                const matchLoc   = !location || p.address.toLowerCase().includes(location);
                const matchType  = !type     || p.type.toLowerCase() === type;
                const matchBeds  = !beds     || (beds === '4' ? p.beds >= 4 : p.beds === parseInt(beds));
                const matchPrice = p.price <= maxPrice;
                return matchLoc && matchType && matchBeds && matchPrice;
            });
 
            sortListings(document.getElementById('sort-select').value, filtered);
        }
 
        function sortListings(value, source) {
            const list = [...(source || filtered)];
            if (value === 'price-asc')  list.sort((a,b) => a.price - b.price);
            if (value === 'price-desc') list.sort((a,b) => b.price - a.price);
            if (value === 'beds-asc')   list.sort((a,b) => a.beds - b.beds);
            if (value === 'beds-desc')  list.sort((a,b) => b.beds - a.beds);
            renderListings(list);
        }
 
        function renderListings(properties) {
            const grid = document.getElementById('listings-grid');
            const meta = document.getElementById('results-meta');
            meta.textContent = `Showing ${properties.length} propert${properties.length !== 1 ? 'ies' : 'y'}`;
 
            if (properties.length === 0) {
                grid.innerHTML = `<div class="empty-state">No properties match your search.<br>Try adjusting your filters.</div>`;
                return;
            }
 
            grid.innerHTML = properties.map(p => `
                <div class="property-card" onclick="viewProperty(${p.id})">
                    <div class="property-img-wrap">
                        ${p.image
                            ? `<img src="${p.image}" alt="${p.address}">`
                            : `<div class="property-img-placeholder">🏠</div>`
                        }
                        <span class="img-badge ${p.available ? 'badge-available' : 'badge-leased'}">
                            ${p.available ? 'Available' : 'Leased'}
                        </span>
                    </div>
                    <div class="property-info">
                        <div class="property-price">$${p.price.toLocaleString()} <span>/ mo</span></div>
                        <div class="property-address">${p.address}</div>
                        <div class="property-details">
                            <span class="detail-chip">🛏 ${p.beds === 0 ? 'Studio' : p.beds + ' Bed' + (p.beds > 1 ? 's' : '')}</span>
                            <span class="detail-chip">🚿 ${p.baths} Bath${p.baths > 1 ? 's' : ''}</span>
                            <span class="detail-chip">📐 ${p.sqft.toLocaleString()} sqft</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
 
        function viewProperty(id) {
            // Hook into your Node.js route: GET /api/properties/:id
            // e.g. window.location.href = `/property.html?id=${id}`;
            console.log('View property id:', id);
        }
 
        // Initial render
        renderListings(allProperties);
    </script>
</body>
</html>
